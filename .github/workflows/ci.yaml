name: Devops App CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Log into docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }} .

      - name: Push docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

      - name: Update manifest repo
        run: |
          git config --global user.email "Actions Bot"
          git config --global user.email "actions@github.com"

          git clone https://${{ secrets.PAT_TOKEN }}@github.com/Aron-dxd/devops-app-config.git

          cd devops-app-config

          #replace with new tag generated through github commit SHA
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}|g" k8s-manifests/deployment.yaml

          git add .
          git commit -m "Update image to ${{ github.sha }}"
          git push
